<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BizTrack Premium — Marketing Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* --- THEME VARIABLES --- */
:root {
  /* LIGHT THEME */
  --bg: #F4F7FE;
  --surface: #FFFFFF;
  --text-main: #2B3674;
  --text-muted: #A3AED1;
  --border: #E2E8F0;
  --accent: #4318FF;
  --accent-hover: #3311DB;
  --accent2: #00B5D8;
  --shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
  --green: #05CD99;
  --red: #EE5D50;
  --amber: #FFCE20;
}

[data-theme="dark"] {
  /* DARK THEME */
  --bg: #0B1437;
  --surface: #111C44;
  --text-main: #FFFFFF;
  --text-muted: #A3AED1;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #7551FF;
  --accent-hover: #8669FF;
  --accent2: #00E396;
  --shadow: 0px 18px 40px rgba(0, 0, 0, 0.4);
  --green: #01B574;
  --red: #EE5D50;
  --amber: #FFB547;
}

/* --- GLOBAL --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Plus Jakarta Sans', sans-serif; 
  background: var(--bg); 
  color: var(--text-main); 
  min-height: 100vh; 
  padding: 30px 20px;
  transition: background-color 0.4s ease, color 0.4s ease;
}
.container { max-width: 1200px; margin: 0 auto; }

/* --- HEADER & TOGGLE --- */
.header { 
  display: flex; justify-content: space-between; align-items: center; 
  margin-bottom: 40px; 
}
.logo-area h1 { 
  font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2)); 
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
}
.logo-area p { 
  font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; 
  letter-spacing: 1px; margin-top: 4px; font-weight: 500;
}
.header-actions { display: flex; align-items: center; gap: 20px; }
.date-badge {
  background: var(--surface); padding: 8px 16px; border-radius: 30px;
  font-size: 13px; font-weight: 600; box-shadow: var(--shadow);
  border: 1px solid var(--border); transition: 0.4s;
}
.theme-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-main); padding: 10px; border-radius: 50%;
  cursor: pointer; box-shadow: var(--shadow); width: 45px; height: 45px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.theme-btn:hover { transform: scale(1.1); border-color: var(--accent); }

/* --- STATS GRID --- */
.stats-grid { 
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
  gap: 24px; margin-bottom: 40px; 
}
.stat-card { 
  background: var(--surface); padding: 24px; border-radius: 20px; 
  box-shadow: var(--shadow); border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.4s ease;
  position: relative; overflow: hidden;
}
.stat-card:hover { transform: translateY(-5px); box-shadow: 0px 20px 40px rgba(0,0,0,0.1); }
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
}
.stat-mail::before { background: var(--accent); }
.stat-ip::before { background: var(--accent2); }
.stat-total::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

.stat-icon {
  width: 48px; height: 48px; border-radius: 50%; display: flex; 
  align-items: center; justify-content: center; font-size: 20px; margin-bottom: 15px;
}
.stat-mail .stat-icon { background: rgba(67, 24, 255, 0.1); color: var(--accent); }
.stat-ip .stat-icon { background: rgba(0, 181, 216, 0.1); color: var(--accent2); }
.stat-total .stat-icon { background: rgba(5, 205, 153, 0.1); color: var(--green); }

.stat-label { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-val { font-size: 32px; font-weight: 800; margin-top: 8px; font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }

/* --- MAIN SECTIONS --- */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
.card { 
  background: var(--surface); border-radius: 24px; box-shadow: var(--shadow); 
  border: 1px solid var(--border); overflow: hidden; transition: 0.4s;
}
.card-head { 
  padding: 24px; border-bottom: 1px solid var(--border); 
  font-weight: 700; font-size: 18px; display: flex; justify-content: space-between; align-items: center;
}
.card-body { padding: 24px; }

/* --- FORMS --- */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
.form-group label { 
  display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); 
  margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
}
.form-group input { 
  width: 100%; background: var(--bg); border: 1px solid var(--border); 
  padding: 14px 16px; border-radius: 12px; color: var(--text-main); 
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 500;
  outline: none; transition: 0.3s;
}
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(67, 24, 255, 0.1); }

.btn { 
  width: 100%; padding: 16px; border-radius: 14px; border: none; 
  font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.3s;
  letter-spacing: 0.5px; font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-mail { background: var(--accent); color: #fff; box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2); }
.btn-mail:hover { background: var(--accent-hover); transform: translateY(-2px); }
.btn-ip { background: var(--accent2); color: #fff; box-shadow: 0 10px 20px rgba(0, 181, 216, 0.2); }
.btn-ip:hover { opacity: 0.9; transform: translateY(-2px); }

/* --- TABLES --- */
.filter-select {
  background: var(--bg); color: var(--text-main); border: 1px solid var(--border);
  padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
  outline: none; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
}
table { width: 100%; border-collapse: collapse; }
th { 
  text-align: left; padding: 16px; font-size: 12px; color: var(--text-muted); 
  text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-bottom: 1px solid var(--border); 
}
td { padding: 16px; font-size: 14px; font-weight: 500; border-bottom: 1px solid var(--border); }
tbody tr { transition: background 0.2s; }
tbody tr:hover { background: rgba(163, 174, 209, 0.05); }
.badge { 
  padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; 
}
.badge-mail { background: rgba(67, 24, 255, 0.1); color: var(--accent); }
.badge-ip { background: rgba(0, 181, 216, 0.1); color: var(--accent2); }
.amt { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.del-btn { 
  background: rgba(238, 93, 80, 0.1); color: var(--red); padding: 6px 12px;
  border: none; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: 0.2s;
}
.del-btn:hover { background: var(--red); color: white; }

@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <h1>BizTrack Pro</h1>
      <p>ENTERPRISE MARKETING HUB</p>
    </div>
    <div class="header-actions">
      <div class="date-badge" id="live-date"></div>
      <button class="theme-btn" id="theme-toggle" title="Toggle Light/Dark Mode">🌙</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card stat-mail">
      <div class="stat-icon">📧</div>
      <div class="stat-label">Mail Investment</div>
      <div class="stat-val" id="total-mail-cost">৳0</div>
    </div>
    <div class="stat-card stat-ip">
      <div class="stat-icon">🌐</div>
      <div class="stat-label">IP Infrastructure</div>
      <div class="stat-val" id="total-ip-cost">৳0</div>
    </div>
    <div class="stat-card stat-total">
      <div class="stat-icon">💰</div>
      <div class="stat-label">Total Capital Deployed</div>
      <div class="stat-val" id="grand-total" style="color: var(--green);">৳0</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-head">Purchase Mails</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label>Price Per Mail (৳)</label>
            <input type="number" id="m-price" placeholder="0.00">
          </div>
          <div class="form-group">
            <label>Quantity Bought</label>
            <input type="number" id="m-qty" placeholder="1000">
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <label>Transaction Date</label>
          <input type="date" id="m-date">
        </div>
        <button class="btn btn-mail" onclick="addEntry('mail')">+ Authorize Mail Purchase</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">Deploy IPs</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label>Cost Per IP (৳)</label>
            <input type="number" id="ip-price" placeholder="0.00">
          </div>
          <div class="form-group">
            <label>Number of IPs</label>
            <input type="number" id="ip-qty" placeholder="10">
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <label>Deployment Date</label>
          <input type="date" id="ip-date">
        </div>
        <button class="btn btn-ip" onclick="addEntry('ip')">+ Authorize IP Deployment</button>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom: 50px;">
    <div class="card-head">
      <span>Financial Ledger</span>
      <select class="filter-select" id="filter" onchange="renderTables()">
        <option value="all">View All Assets</option>
        <option value="mail">Mails Only</option>
        <option value="ip">IPs Only</option>
      </select>
    </div>
    <div class="card-body" style="padding: 0; overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Asset Type</th><th>Date</th><th>Unit Cost</th><th>Volume</th><th>Total Value</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="txn-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// --- THEME TOGGLE LOGIC ---
const themeBtn = document.getElementById('theme-toggle');
const htmlEl = document.documentElement;

// Check saved theme
const savedTheme = localStorage.getItem('biz_theme') || 'dark';
htmlEl.setAttribute('data-theme', savedTheme);
updateThemeIcon(savedTheme);

themeBtn.addEventListener('click', () => {
  let current = htmlEl.getAttribute('data-theme');
  let nextTheme = current === 'dark' ? 'light' : 'dark';
  htmlEl.setAttribute('data-theme', nextTheme);
  localStorage.setItem('biz_theme', nextTheme);
  updateThemeIcon(nextTheme);
});

function updateThemeIcon(theme) {
  themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

// --- DATA LOGIC ---
let data = JSON.parse(localStorage.getItem('biz_pro_data')) || [];

function save() {
  localStorage.setItem('biz_pro_data', JSON.stringify(data));
  renderTables();
}

function addEntry(type) {
  const pId = type === 'mail' ? 'm-price' : 'ip-price';
  const qId = type === 'mail' ? 'm-qty' : 'ip-qty';
  const dId = type === 'mail' ? 'm-date' : 'ip-date';

  const price = parseFloat(document.getElementById(pId).value);
  const qty = parseInt(document.getElementById(qId).value);
  const date = document.getElementById(dId).value || new Date().toISOString().split('T')[0];

  if(!price || !qty) { alert("Please enter valid price and quantity."); return; }

  data.unshift({ id: Date.now(), type, price, qty, total: price * qty, date });
  
  document.getElementById(pId).value = '';
  document.getElementById(qId).value = '';
  save();
}

function deleteEntry(id) {
  if(confirm("Delete this record permanently?")) {
    data = data.filter(item => item.id !== id);
    save();
  }
}

function renderTables() {
  const filter = document.getElementById('filter').value;
  const tbody = document.getElementById('txn-body');
  let mailTotal = 0, ipTotal = 0;
  
  tbody.innerHTML = '';
  
  data.forEach(item => {
    if(item.type === 'mail') mailTotal += item.total;
    if(item.type === 'ip') ipTotal += item.total;

    if(filter === 'all' || filter === item.type) {
      const badgeClass = item.type === 'mail' ? 'badge-mail' : 'badge-ip';
      tbody.innerHTML += `
        <tr>
          <td><span class="badge ${badgeClass}">${item.type.toUpperCase()}</span></td>
          <td style="color: var(--text-muted); font-size: 13px;">${item.date}</td>
          <td class="amt">৳${item.price.toLocaleString()}</td>
          <td class="amt">${item.qty.toLocaleString()}</td>
          <td class="amt" style="font-weight: 700; color: var(--text-main);">৳${item.total.toLocaleString()}</td>
          <td><button class="del-btn" onclick="deleteEntry(${item.id})">Delete</button></td>
        </tr>
      `;
    }
  });

  if(data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 40px; color: var(--text-muted);">No transaction records found.</td></tr>`;
  }

  document.getElementById('total-mail-cost').textContent = '৳' + mailTotal.toLocaleString();
  document.getElementById('total-ip-cost').textContent = '৳' + ipTotal.toLocaleString();
  document.getElementById('grand-total').textContent = '৳' + (mailTotal + ipTotal).toLocaleString();
}

// Init Dates
const today = new Date().toISOString().split('T')[0];
document.getElementById('m-date').value = today;
document.getElementById('ip-date').value = today;

// Format Live Date
const dateOptions = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
document.getElementById('live-date').textContent = new Date().toLocaleDateString('en-US', dateOptions);

renderTables();
</script>

</body>
</html>
